services:
  web:
    build: ./frontend
    ports:
      - "${WEB_PORT}:4200"
        
  sql-database:
    build: ./database
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "${SQL_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - spring.datasource.url=jdbc:mysql://sql-database:3306/grocery_helper?createDatabaseIfNotExist=true&autoReconnect=true
    depends_on:
      sql-database:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  test:
    image: bash
    